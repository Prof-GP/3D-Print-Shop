<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="14,2 26,9 26,19 14,26 2,19 2,9" fill="none" stroke="#f97316" stroke-width="2"/>
        <polygon points="14,8 20,11.5 20,18.5 14,22 8,18.5 8,11.5" fill="#f97316" opacity="0.3"/>
        <line x1="14" y1="2" x2="14" y2="8" stroke="#f97316" stroke-width="1.5"/>
        <line x1="26" y1="9" x2="20" y2="11.5" stroke="#f97316" stroke-width="1.5"/>
        <line x1="26" y1="19" x2="20" y2="18.5" stroke="#f97316" stroke-width="1.5"/>
        <line x1="14" y1="26" x2="14" y2="22" stroke="#f97316" stroke-width="1.5"/>
        <line x1="2" y1="19" x2="8" y2="18.5" stroke="#f97316" stroke-width="1.5"/>
        <line x1="2" y1="9" x2="8" y2="11.5" stroke="#f97316" stroke-width="1.5"/>
      </svg>
      <span>{{ .Site.Title }}</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
        <li><a href="/commission/" class="btn btn-primary nav-cta">Get a Quote</a></li>
      </ul>
    </nav>
  </div>
</header>
<script>
  document.querySelector('.nav-toggle').addEventListener('click', function() {
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    document.querySelector('.site-nav').classList.toggle('open');
  });
</script>
