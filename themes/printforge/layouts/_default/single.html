{{ define "main" }}
<section class="page-hero page-hero--short">

    <h1>{{ .Title }}</h1>
    {{ if .Description }}<p>{{ .Description }}</p>{{ end }}
  </div>
</section>
<section class="section">
  <div class="container prose">
    {{ .Content }}
  </div>
</section>
{{ end }}
